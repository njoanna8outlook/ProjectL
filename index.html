<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>For You 💖</title>

<style>
body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
background: linear-gradient(to bottom, #ffe6f0, #fff0f5);
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
overflow: hidden;
}

/* 💖 common card */
.app {
width: 92%;
max-width: 420px;
background: white;
border-radius: 24px;
padding: 22px;
box-shadow: 0 15px 40px rgba(0,0,0,0.12);
text-align: center;
position: relative;
z-index: 2;
}

h1 {
font-size: 22px;
margin-bottom: 16px;
color: #ff4d88;
}

.subtitle {
font-size: 12px;
color: #888;
margin-bottom: 20px;
}

/* 💖 GATE PAGE */
.options {
display: flex;
justify-content: space-between;
gap: 16px;
margin-top: 25px;
}

.option {
flex: 1;
text-align: center;
padding: 12px;
border: 2px solid #ffd6e7;
border-radius: 16px;
background: #fff7fa;
position: relative;
}


.option img {
width: 100%;
max-width: 110px;
aspect-ratio: 1/1;
border-radius: 50%;
object-fit: cover;
}


/* 💖 name box */
.name {
margin-top: 10px;
font-size: 14px;
background: #ffe6f0;
padding: 6px 10px;
border-radius: 10px;
display: inline-block;
position: relative;
transition: transform 0.15s ease;
}


/* 💌 APP */
.buttons {
display: flex;
flex-direction: column;
gap: 12px;
}

button {
padding: 14px;
border: none;
border-radius: 14px;
background: linear-gradient(135deg, #ffb6c1, #ff85a2);
color: white;
font-size: 14px;
font-weight: 500;
cursor: pointer;
transition: transform 0.12s ease, box-shadow 0.12s ease;
}

button:active {
transform: scale(0.96);
box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

#messageBox {
margin-top: 22px;
padding: 18px;
border-radius: 16px;
background: #fff0f5;
min-height: 70px;
font-size: 15px;
color: #444;
line-height: 1.5;
}

.extra-btn {
margin-top: 12px;
background: linear-gradient(135deg, #ff4d88, #e6005c);
}

/* typing */
.cursor {
display: inline-block;
margin-left: 2px;
animation: blink 1s infinite;
}

@keyframes blink {
0%, 50%, 100% { opacity: 1; }
25%, 75% { opacity: 0; }
}

/* hearts */
.heart {
position: absolute;
bottom: -10px;
color: #ff4d88;
font-size: 16px;
animation: floatUp linear forwards;
opacity: 0.7;
}

@keyframes floatUp {
from {
transform: translateY(0) scale(1);
opacity: 0.8;
}
to {
transform: translateY(-100vh) scale(1.6);
opacity: 0;
}
}
</style>
</head>

<body>

<!-- 💖 PAGE 1: CHAOTIC GATE -->
<div id="gatePage" class="app">
<h1>Answer the Question to Unlock Letters 💖</h1>
<div id="questionText" class="subtitle"></div>

<div class="options">

<div class="option" onclick="enterApp()">
<img id="yourImg">
<div class="name">Joanna 😌</div>
</div>

<div class="option" id="hisOption">
<img id="hisImg">
<div class="name" id="hisName">John 😏</div>
</div>

</div>
</div>

<!-- 💌 PAGE 2: YOUR APP -->
<div id="mainApp" class="app" style="display:none;">
<h1>For You 💖</h1>
<div class="subtitle">pick your mood…</div>

<div class="buttons">
<button onclick="showMessage('sad')">Sad 😢</button>
<button onclick="showMessage('missMe')">Miss Me 💭</button>
<button onclick="showMessage('sleep')">Can’t Sleep 🌙</button>
</div>

<div id="messageBox">Tap a mood… I’m here 💌</div>

</div>

<script>
/* 💖 QUESTIONS */
const questions = [
"Who is the better cook? 👀",
"Who is smarter? 😏",
"Who fell first? 💘",
"Who is always right? 😌",
"Who is cuter? 🥺"
];

/* 🖼️ IMAGES */
const yourImages = ["you1.jpg","you2.jpg","you3.jpg","you4.jpg","you5.jpg"];
const hisImages = ["him1.jpg","him2.jpg","him3.jpg","him4.jpg","him5.jpg"];

function getRandom(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

/* 🎲 INIT */
window.onload = function(){
document.getElementById("questionText").innerText = getRandom(questions);
document.getElementById("yourImg").src = getRandom(yourImages);
document.getElementById("hisImg").src = getRandom(hisImages);
};

/* 😈 CHAOS BUTTON */
const hisName = document.getElementById("hisName");

hisName.addEventListener("touchstart", moveName);
hisName.addEventListener("mouseover", moveName);

function moveName() {
const x = Math.random() * 120 - 60;
const y = Math.random() * 80 - 40;

hisName.style.transform = `translate(${x}px, ${y}px)`;
}


/* 💖 ENTER APP */
function enterApp(){
document.getElementById("gatePage").style.display="none";
document.getElementById("mainApp").style.display="block";
}

/* 💌 ORIGINAL APP LOGIC */
const messages = {
sad:[
"Hey… I know today feels heavy, but I'm always on your side ❤️",
"If I was there, you'd be getting the biggest hug right now.",
"You don’t have to be strong all the time, I’ve got you.",
"Even on your worst days, you're still my favorite person.",
"Bad day? Okay. But you're still my person. That doesn't change."
],
missMe:[
"I miss you more. Not even a competition 😤",
"Imagine me annoying you right now. You're welcome.",
"Okay but… when are we meeting next 👀",
"If teleportation existed, I'd already be there.",
"You're literally my favorite notification."
],
sleep:[
"Close your eyes… I’m right there next to you 🤍",
"Stop overthinking. You deserve rest.",
"Goodnight… dream about me obviously 😌",
"Put your phone down. Yes, I mean it.",
"I hope you wake up tomorrow feeling lighter. I’m always with you."
]
};

let currentMood=null;

function getRandomMessage(mood){
const arr=messages[mood];
return arr[Math.floor(Math.random()*arr.length)];
}

function typeText(text){
const box=document.getElementById("messageBox");
box.innerHTML="";
let i=0;

const cursor=document.createElement("span");
cursor.className="cursor";
cursor.innerText="|";
box.appendChild(cursor);

const interval=setInterval(()=>{
cursor.insertAdjacentText("beforebegin",text[i]);
i++;
if(i>=text.length){
clearInterval(interval);
cursor.remove();
}
},18);
}

function showMessage(mood){
currentMood=mood;
typeText(getRandomMessage(mood));
}

function repeatMessage(){
if(!currentMood) return;
typeText(getRandomMessage(currentMood));
}

/* 💖 hearts */
function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerText=Math.random()>0.5?"💖":"💕";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(12+Math.random()*18)+"px";
heart.style.animationDuration=(3+Math.random()*2)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),5000);
}

setInterval(createHeart,400);
</script>

</body>
</html>
